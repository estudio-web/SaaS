<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">

<div id="toast-container" aria-live="polite"></div>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">🍞</div>
    <h1 class="auth-title">Panel Admin</h1>
    <p class="auth-subtitle">Ingresá con tu cuenta de administrador</p>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@mipanaderia.com"
               autocomplete="email" required />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div style="position:relative">
          <input type="password" id="password" placeholder="••••••••"
                 autocomplete="current-password" required style="padding-right:3rem" />
          <button type="button" id="toggle-pw" class="toggle-pw-btn" aria-label="Mostrar contraseña">👁</button>
        </div>
      </div>

      <div id="login-error" class="auth-error hidden">
        Credenciales incorrectas. Verificá email y contraseña.
      </div>

      <button type="submit" class="btn-primary" id="btn-login">
        <span id="login-text">Ingresar al panel</span>
        <span id="login-loading" class="hidden">Verificando...</span>
      </button>
    </form>

    <p style="margin-top:1.5rem;text-align:center;font-size:.8rem;opacity:.45">
      <a href="../public/index.html">← Volver a la tienda</a>
    </p>
  </div>
</div>

<script type="module" src="admin.js"></script>
</body>
</html>
